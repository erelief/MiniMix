<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>拼好图</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="toolbar">
    <div class="toolbar-row">
      <!-- 添加图片 -->
      <div class="toolbar-group">
        <label class="btn upload-btn" title="添加图片">
          <i data-lucide="image-plus" class="icon-20"></i>
          <input type="file" id="add-images" accept="image/*" multiple hidden />
        </label>
      </div>

      <!-- 添加纯色图片 -->
      <div class="toolbar-group">
        <div class="solid-add-wrapper">
          <button class="btn solid-add-btn" id="btn-add-solid" title="添加纯色图片">
            <i data-lucide="paint-bucket" class="icon-20"></i>
            <span class="solid-color-dot" id="solid-color-dot"></span>
          </button>
          <input type="color" id="solid-color-input" value="#000000" title="选择纯色图片颜色" />
        </div>
      </div>

      <!-- 布局模式 -->
      <div class="toolbar-group">
        <button class="btn tool-btn active" data-layout="horizontal" title="横排">
          <i data-lucide="columns-2" class="icon-20"></i>
        </button>
        <button class="btn tool-btn" data-layout="vertical" title="纵排">
          <i data-lucide="rows-2" class="icon-20"></i>
        </button>
        <div class="ratio-toolbar-wrapper">
          <button class="btn tool-btn" id="btn-ratio" disabled title="调整所有图片比例">
            <i data-lucide="grid-2x2" class="icon-20"></i>
          </button>
          <div class="ratio-dropdown" id="ratio-dropdown"></div>
        </div>
        <div class="ratio-toolbar-wrapper">
          <button class="btn tool-btn" id="btn-canvas-ratio" disabled title="锁定全局画布比例">
            <i data-lucide="layout" class="icon-20"></i>
          </button>
          <div class="ratio-dropdown" id="canvas-ratio-dropdown"></div>
        </div>
      </div>

      <!-- 批量编号 -->
      <div class="toolbar-group">
        <button class="btn tool-btn" id="btn-index-badge" disabled title="给所有图片编号">
          <i data-lucide="hash" class="icon-20"></i>
        </button>
        <div class="solid-add-wrapper">
          <button class="btn tool-btn solid-color-pick-btn" id="btn-index-badge-color" disabled title="编号颜色">
            <span class="solid-color-dot" id="index-badge-color-dot"></span>
          </button>
          <input type="color" id="index-badge-color" value="#E61919" title="编号颜色" />
        </div>
        <div class="ratio-toolbar-wrapper">
          <button class="btn tool-btn" id="btn-index-badge-corner" disabled title="编号位置">
            <i data-lucide="move-up-left" class="icon-20"></i>
          </button>
          <div class="ratio-dropdown" id="index-badge-corner-dropdown"></div>
        </div>
        <button class="btn tool-btn" id="btn-index-badge-clear" disabled title="清除全部编号">
          <i data-lucide="eraser" class="icon-20"></i>
        </button>
      </div>

      <!-- 撤销/重做 -->
      <div class="toolbar-group">
        <button class="btn action-btn" id="btn-undo" disabled title="撤销 (Ctrl+Z)">
          <i data-lucide="undo-2" class="icon-20"></i>
        </button>
        <button class="btn action-btn" id="btn-redo" disabled title="重做 (Ctrl+Shift+Z)">
          <i data-lucide="redo-2" class="icon-20"></i>
        </button>
        <button class="btn action-btn" id="btn-clear" disabled title="清除画布">
          <i data-lucide="trash-2" class="icon-20"></i>
        </button>
      </div>

      <!-- 导出 -->
      <div class="toolbar-group export-group">
        <button class="btn export-btn" id="btn-copy" disabled title="复制到剪贴板 (Ctrl+C)">
          <i data-lucide="copy" class="icon-20"></i>
        </button>
        <button class="btn export-btn" id="btn-save" disabled title="保存">
          <i data-lucide="download" class="icon-20"></i>
        </button>
      </div>

      <!-- 信息 -->
      <button class="btn" id="btn-info" title="关于">
        <i data-lucide="info" class="icon-20"></i>
      </button>
    </div>

    <div id="status-bar">拖拽或点击添加图片开始拼图</div>
  </div>

  <!-- 主工作区 -->
  <div id="workspace">
    <canvas id="main-canvas"></canvas>

    <!-- 行列拖拽把手容器 -->
    <div id="grip-container"></div>

    <!-- 新增行/列指示器（固定定位，不随画布变化） -->
    <div id="new-row-before" class="new-row-indicator">
      <i data-lucide="plus" class="icon-20"></i>
    </div>
    <div id="new-row-after" class="new-row-indicator">
      <i data-lucide="plus" class="icon-20"></i>
    </div>

    <!-- 拖拽覆盖层 -->
    <div id="drop-overlay" class="drop-overlay">
      <div class="drop-zone">
        <i data-lucide="image" class="icon-40"></i>
        <span>释放以添加图片</span>
      </div>
    </div>

    <!-- 5K 缩放提示 -->
    <div id="scale-toast" class="scale-toast">输出超过5K像素，已自动缩放</div>

    <!-- 复制进度遮罩（阻塞） -->
    <div id="copy-progress-overlay" class="copy-progress-overlay">
      <div class="copy-progress-card">
        <div class="copy-progress-spinner"></div>
        <i data-lucide="circle-check-big" class="copy-progress-icon success"></i>
        <i data-lucide="circle-x" class="copy-progress-icon error"></i>
        <span class="copy-progress-text" id="copy-progress-text">正在复制…</span>
      </div>
    </div>

    <div id="update-toast" class="update-toast">
      <span id="update-toast-text"></span>
      <button class="update-toast-btn" id="update-toast-btn">查看</button>
      <button class="update-toast-close" id="update-toast-close"><i data-lucide="x" class="icon-16"></i></button>
    </div>
  </div>

  <!-- 保存弹窗 -->
  <div class="modal-overlay" id="save-modal">
    <div class="modal-card">
      <div class="modal-header">
        <span>保存图片</span>
        <button class="modal-close-btn" id="save-modal-close"><i data-lucide="x" class="icon-16"></i></button>
      </div>
      <div class="modal-body">
        <div class="modal-preview">
          <canvas id="save-preview-canvas"></canvas>
        </div>
        <div class="modal-controls">
          <div class="modal-control-row">
            <label class="modal-label">格式</label>
            <select id="save-format">
              <option value="png">PNG (无损)</option>
              <option value="jpg">JPG (有损)</option>
            </select>
          </div>
          <div class="modal-control-row" id="lossless-compress-row">
            <label class="modal-label">压缩</label>
            <label class="save-checkbox-label">
              <input type="checkbox" id="save-lossless-compress" />
              <span>无损压缩（速度较慢）</span>
            </label>
          </div>
          <div class="modal-control-row" id="quality-row">
            <label class="modal-label">质量</label>
            <input type="range" id="save-quality" min="10" max="100" value="90" step="5" />
            <span id="save-quality-value">90</span>%
          </div>
          <div class="modal-control-row">
            <label class="modal-label">分辨率</label>
            <input type="range" id="save-resolution" min="10" max="200" value="100" step="1" />
            <span id="save-resolution-value">100</span>%
          </div>
          <div class="modal-control-row">
            <span class="modal-label">尺寸</span>
            <span id="save-size-info"><span id="save-size-w">-</span> x <span id="save-size-h">-</span></span>
          </div>
          <div class="modal-control-row">
            <span class="modal-label">预估大小</span>
            <span id="save-file-size">-</span>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn" id="save-modal-cancel">取消</button>
        <button class="btn btn-primary" id="save-modal-confirm">保存</button>
      </div>
    </div>
  </div>

  <!-- 信息弹窗 -->
  <div class="modal-overlay" id="info-modal">
    <div class="modal-card info-card">
      <div class="modal-header">
        <span>关于</span>
        <button class="modal-close-btn" id="info-modal-close"><i data-lucide="x" class="icon-16"></i></button>
      </div>
      <div class="modal-body info-body">
        <div class="info-title-row">
          <img class="info-app-icon" id="info-app-icon" src="" alt="">
          <span class="info-app-name">拼好图</span>
          <span class="info-app-name-en">MiniMix</span>
          <span class="info-version">v<span id="info-version-number"></span></span>
        </div>
        <div class="update-section" id="update-section">
          <button class="btn btn-update-check" id="btn-check-update" disabled>
            <i data-lucide="rotate-ccw" class="icon-14"></i>
            检查更新
          </button>
          <label class="auto-update-toggle">
            <span class="auto-update-label">自动更新</span>
            <span class="ratio-toggle">
              <input type="checkbox" id="auto-update-toggle" checked>
              <span class="ratio-toggle-slider"></span>
            </span>
          </label>
        </div>
        <div class="info-divider"></div>
        <div class="info-section">
          <span class="info-label">项目地址</span>
          <a class="info-value info-value-link" href="https://github.com/erelief/MiniMix" rel="noopener noreferrer">
            <i data-lucide="github" class="icon-14"></i>
            erelief/MiniMix
          </a>
        </div>
        <div class="info-section">
          <span class="info-label">开源许可</span>
          <span class="info-value">MIT License</span>
        </div>
        <div class="info-divider hidden" id="deps-divider"></div>
        <div id="info-deps"></div>
      </div>
    </div>
  </div>

  <script type="module" src="/main.js"></script>
</body>
</html>
