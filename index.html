<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>拼好图</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="toolbar">
    <div class="toolbar-row">
      <!-- 添加图片 -->
      <div class="toolbar-group">
        <label class="btn upload-btn" title="添加图片">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 5h6"/><path d="M19 2v6"/><path d="M21 11.5V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7.5"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/><circle cx="9" cy="9" r="2"/></svg>
          <input type="file" id="add-images" accept="image/*" multiple hidden />
        </label>
      </div>

      <!-- 布局模式 -->
      <div class="toolbar-group">
        <button class="btn tool-btn active" data-layout="horizontal" title="横排">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M12 3v18"/></svg>
        </button>
        <button class="btn tool-btn" data-layout="vertical" title="纵排">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 12h18"/></svg>
        </button>
      </div>

      <!-- 撤销/重做 -->
      <div class="toolbar-group">
        <button class="btn action-btn" id="btn-undo" disabled title="撤销 (Ctrl+Z)">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
        </button>
        <button class="btn action-btn" id="btn-redo" disabled title="重做 (Ctrl+Shift+Z)">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 2.7"/></svg>
        </button>
        <button class="btn action-btn" id="btn-clear" disabled title="清除画布">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 11v6"/><path d="M14 11v6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        </button>
      </div>

      <!-- 导出 -->
      <div class="toolbar-group" style="margin-left:auto">
        <button class="btn export-btn" id="btn-copy" disabled title="复制到剪贴板 (Ctrl+C)">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
        </button>
        <button class="btn export-btn" id="btn-save" disabled title="保存">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15V3"/><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="m7 10 5 5 5-5"/></svg>
        </button>
      </div>

      <!-- 信息 -->
      <button class="btn" id="btn-info" title="关于">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
      </button>
    </div>

    <div id="status-bar">拖拽或点击添加图片开始拼图</div>
  </div>

  <!-- 主工作区 -->
  <div id="workspace">
    <canvas id="main-canvas"></canvas>

    <!-- 行列拖拽把手容器 -->
    <div id="grip-container"></div>

    <!-- 新增行/列指示器（固定定位，不随画布变化） -->
    <div id="new-row-before" class="new-row-indicator">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </div>
    <div id="new-row-after" class="new-row-indicator">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </div>

    <!-- 拖拽覆盖层 -->
    <div id="drop-overlay" class="drop-overlay">
      <div class="drop-zone">
        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
        <span>释放以添加图片</span>
      </div>
    </div>

    <!-- 5K 缩放提示 -->
    <div id="scale-toast" class="scale-toast">输出超过5K像素，已自动缩放</div>

    <!-- 复制成功提示 -->
    <div id="copy-toast" class="copy-toast">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.801 10A10 10 0 1 1 17 3.335"/><path d="m9 11 3 3L22 4"/></svg>
      <span>已复制到剪贴板</span>
    </div>
  </div>

  <!-- 保存弹窗 -->
  <div class="modal-overlay" id="save-modal">
    <div class="modal-card">
      <div class="modal-header">
        <span>保存图片</span>
        <button class="modal-close-btn" id="save-modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="modal-preview">
          <canvas id="save-preview-canvas"></canvas>
        </div>
        <div class="modal-controls">
          <div class="modal-control-row">
            <label class="modal-label">格式</label>
            <select id="save-format">
              <option value="png">PNG (无损)</option>
              <option value="jpg">JPG (有损)</option>
            </select>
          </div>
          <div class="modal-control-row" id="quality-row">
            <label class="modal-label">质量</label>
            <input type="range" id="save-quality" min="10" max="100" value="90" step="5" />
            <span id="save-quality-value">90</span>%
          </div>
          <div class="modal-control-row">
            <label class="modal-label">分辨率</label>
            <input type="range" id="save-resolution" min="10" max="200" value="100" step="1" />
            <span id="save-resolution-value">100</span>%
          </div>
          <div class="modal-control-row">
            <span class="modal-label">尺寸</span>
            <span id="save-size-info">-</span>
          </div>
          <div class="modal-control-row">
            <span class="modal-label">预估大小</span>
            <span id="save-file-size">-</span>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn" id="save-modal-cancel">取消</button>
        <button class="btn btn-primary" id="save-modal-confirm">保存</button>
      </div>
    </div>
  </div>

  <!-- 信息弹窗 -->
  <div class="modal-overlay" id="info-modal">
    <div class="modal-card info-card">
      <div class="modal-header">
        <span>关于</span>
        <button class="modal-close-btn" id="info-modal-close">&times;</button>
      </div>
      <div class="modal-body info-body">
        <div class="info-title-row">
          <img class="info-app-icon" id="info-app-icon" src="" alt="">
          <span class="info-app-name">拼好图</span>
          <span class="info-app-name-en">MiniMix</span>
          <span class="info-version">v<span id="info-version-number"></span></span>
        </div>
        <div class="info-divider"></div>
        <div class="info-section">
          <span class="info-label">项目地址</span>
          <a class="info-value info-value-link" href="https://github.com/erelief/MiniMix" target="_blank" rel="noopener noreferrer">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
            erelief/MiniMix
          </a>
        </div>
        <div class="info-section">
          <span class="info-label">开源许可</span>
          <span class="info-value">MIT License</span>
        </div>
        <div class="info-section">
          <span class="info-label">图标来源</span>
          <a class="info-value info-value-link" href="https://lucide.dev" target="_blank" rel="noopener noreferrer">Lucide</a>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/main.js"></script>
</body>
</html>
