name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target universal-apple-darwin'
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm install

      - name: Sync version to Cargo.toml
        run: node scripts/sync-version.js

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: '拼好图 v__VERSION__'
          releaseBody: |
            # 改进

            - **裁剪四边速度绝对一致**：用 globalDelta × 2 / lockedScale 抵消 flexbox 居中减半效应，左右上下四边拖拽手感完全统一
            - **松手零跳动**：拖拽结束不做任何额外操作，画布实时保持自然居中，所见即所得
            - **退出/复位瞬间归位**：点击保存退出或复位按钮，画布瞬间回归居中，干净利落

            # 修复

            - **更新检查网络兼容性提升**

            # 重构

            - 移除 CSS transform 视觉锚定、offset 累加、displayScale 冻结、过渡动画等复杂机制
            - 代码净减少，回归最纯粹的状态管理
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}

